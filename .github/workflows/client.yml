name: Client

on:
  pull_request:
    paths:
      - Client/**
      - scripts/validate-client-signing.rb
      - scripts/verify-release-readiness.rb
      - scripts/validate-app-store-metadata.rb
      - scripts/validate-device-evidence.rb
      - scripts/export-app-store-submission-package.rb
      - .github/workflows/client.yml
  push:
    branches:
      - main
    paths:
      - Client/**
      - scripts/validate-client-signing.rb
      - scripts/verify-release-readiness.rb
      - scripts/validate-app-store-metadata.rb
      - scripts/validate-device-evidence.rb
      - scripts/export-app-store-submission-package.rb
      - .github/workflows/client.yml

permissions:
  contents: read

jobs:
  client:
    name: Client
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Regenerate Xcode project
        working-directory: Client
        run: xcodegen generate

      - name: Check generated project is committed
        run: git diff --exit-code Client/Gifster.xcodeproj Client/App/Gifster/Info.plist Client/Extensions/GifsterMessages/Info.plist

      - name: Validate client signing configuration
        run: scripts/validate-client-signing.rb

      - name: Validate release readiness invariants
        run: ruby scripts/verify-release-readiness.rb

      - name: Validate App Store metadata
        run: scripts/validate-app-store-metadata.rb

      - name: Validate App Store submission package tooling
        run: |
          ruby -c scripts/export-app-store-submission-package.rb
          scripts/export-app-store-submission-package.rb --help

      - name: Validate device evidence tooling
        run: |
          ruby -c scripts/validate-device-evidence.rb
          scripts/validate-device-evidence.rb --template /tmp/gifster-device-evidence-template.json

      - name: Run Swift package tests
        working-directory: Client/Packages/GifsterCore
        run: swift test --scratch-path /private/tmp/gifster-swiftpm

      - name: Build iOS app and UI tests
        run: xcodebuild -project Client/Gifster.xcodeproj -scheme Gifster -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' build-for-testing CODE_SIGNING_ALLOWED=NO

      - name: Lint plists and entitlements
        run: |
          plutil -lint \
            Client/App/Gifster/Info.plist \
            Client/App/Gifster/Gifster.entitlements \
            Client/Extensions/GifsterMessages/Info.plist \
            Client/Extensions/GifsterMessages/GifsterMessages.entitlements
