name: Deploy Nonprod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: GHCR backend image tag to deploy.
        required: true
        default: latest
      location:
        description: Azure region for the nonprod resource group.
        required: true
        default: eastus
      enable_demo_app_attest_bypass:
        description: Enable demo App Attest bypass for this nonprod smoke test.
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

env:
  BACKEND_IMAGE: ghcr.io/eslutz/gifster-backend
  RESOURCE_GROUP_NAME: rg-gifster-nonprod

jobs:
  deploy:
    name: Deploy nonprod and smoke test
    runs-on: ubuntu-latest
    environment: nonprod
    steps:
      - uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep templates
        run: |
          az bicep build --file infra/main.bicep
          az bicep build --file infra/main.subscription.bicep

      - name: Deploy nonprod infrastructure
        id: deploy
        run: |
          set -euo pipefail

          image="${BACKEND_IMAGE}:${{ inputs.image_tag }}"
          app_attest_app_identifier="${GIFSTER_APP_ATTEST_APP_IDENTIFIER:-}"
          app_attest_root_certificate_pem="${GIFSTER_APP_ATTEST_ROOT_CERTIFICATE_PEM:-}"

          az deployment sub create \
            --name "gifster-nonprod-${GITHUB_RUN_ID}" \
            --location "${{ inputs.location }}" \
            --template-file infra/main.subscription.bicep \
            --parameters \
              environmentName=nonprod \
              location="${{ inputs.location }}" \
              resourceGroupName="${RESOURCE_GROUP_NAME}" \
              containerImage="$image" \
              appAttestAppIdentifier="$app_attest_app_identifier" \
              appAttestRootCertificatePem="$app_attest_root_certificate_pem" \
              appAttestDemoBypassEnabled=${{ inputs.enable_demo_app_attest_bypass }} \
              providerAdapter=fake \
              minReplicas=1 \
              workerMinReplicas=1 \
            --query properties.outputs \
            --output json > /tmp/gifster-deployment-outputs.json

          fqdn="$(jq -r '.containerAppFqdn.value' /tmp/gifster-deployment-outputs.json)"
          if [ -z "$fqdn" ] || [ "$fqdn" = "null" ]; then
            echo "Deployment did not return containerAppFqdn." >&2
            cat /tmp/gifster-deployment-outputs.json >&2
            exit 1
          fi

          echo "backend_url=https://${fqdn}" >> "$GITHUB_OUTPUT"
          echo "Deployed Gifster API to https://${fqdn}"
        env:
          GIFSTER_APP_ATTEST_APP_IDENTIFIER: ${{ secrets.GIFSTER_APP_ATTEST_APP_IDENTIFIER }}
          GIFSTER_APP_ATTEST_ROOT_CERTIFICATE_PEM: ${{ secrets.GIFSTER_APP_ATTEST_ROOT_CERTIFICATE_PEM }}

      - name: Smoke test backend
        run: scripts/smoke-backend.sh
        env:
          GIFSTER_BACKEND_URL: ${{ steps.deploy.outputs.backend_url }}
          GIFSTER_SMOKE_USE_DEMO_APP_ATTEST: ${{ inputs.enable_demo_app_attest_bypass }}
          GIFSTER_APP_ATTEST_SESSION_TOKEN: ${{ secrets.GIFSTER_APP_ATTEST_SESSION_TOKEN }}
