name: Deploy Nonprod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Immutable GHCR backend commit SHA tag to deploy.
        required: true
      location:
        description: Azure region for the nonprod resource group.
        required: true
        default: eastus

permissions:
  contents: read
  id-token: write

env:
  BACKEND_IMAGE: ghcr.io/eslutz/gifforge-backend
  RESOURCE_GROUP_NAME: rg-gifforge-nonprod
  SQL_SERVER: ericslutz-dev-db.database.windows.net
  SQL_DATABASE: ericslutz.dev.db

jobs:
  deploy:
    name: Deploy nonprod and smoke test
    runs-on: ubuntu-latest
    environment: nonprod
    steps:
      - uses: actions/checkout@v6

      - name: Validate nonprod deployment inputs
        run: |
          set -euo pipefail

          if [[ ! "${IMAGE_TAG}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "image_tag must be an immutable 40-character commit SHA tag, not '${IMAGE_TAG}'." >&2
            exit 1
          fi

          required_secrets=(
            AZURE_CLIENT_ID
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
            GIFFORGE_APP_ATTEST_APP_IDENTIFIER
            GIFFORGE_APP_ATTEST_ROOT_CERTIFICATE_PEM
            GIFFORGE_APP_STORE_JWS_ROOT_CERTIFICATE_PEM
          )

          for secret_name in "${required_secrets[@]}"; do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing required nonprod environment secret: ${secret_name}" >&2
              exit 1
            fi
          done
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          GIFFORGE_APP_ATTEST_APP_IDENTIFIER: ${{ secrets.GIFFORGE_APP_ATTEST_APP_IDENTIFIER }}
          GIFFORGE_APP_ATTEST_ROOT_CERTIFICATE_PEM: ${{ secrets.GIFFORGE_APP_ATTEST_ROOT_CERTIFICATE_PEM }}
          GIFFORGE_APP_STORE_JWS_ROOT_CERTIFICATE_PEM: ${{ secrets.GIFFORGE_APP_STORE_JWS_ROOT_CERTIFICATE_PEM }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep templates
        run: |
          az bicep build --file infra/main.bicep
          az bicep build --file infra/main.subscription.bicep

      - name: Deploy nonprod infrastructure
        id: deploy
        run: |
          set -euo pipefail

          image="${BACKEND_IMAGE}:${IMAGE_TAG}"
          app_attest_app_identifier="${GIFFORGE_APP_ATTEST_APP_IDENTIFIER:-}"
          app_attest_root_certificate_pem="${GIFFORGE_APP_ATTEST_ROOT_CERTIFICATE_PEM:-}"
          app_store_jws_root_certificate_pem="${GIFFORGE_APP_STORE_JWS_ROOT_CERTIFICATE_PEM:-}"

          az deployment group create \
            --name "gifforge-nonprod-${GITHUB_RUN_ID}" \
            --resource-group "${RESOURCE_GROUP_NAME}" \
            --template-file infra/main.bicep \
            --parameters \
              environmentName=nonprod \
              location="${{ inputs.location }}" \
              containerImage="$image" \
              sqlServer="${SQL_SERVER}" \
              sqlDatabase="${SQL_DATABASE}" \
              appStoreJwsRootCertificatePem="$app_store_jws_root_certificate_pem" \
              appAttestAppIdentifier="$app_attest_app_identifier" \
              appAttestRootCertificatePem="$app_attest_root_certificate_pem" \
              appAttestDemoBypassEnabled=false \
              minReplicas=0 \
              workerMinReplicas=0 \
            --query properties.outputs \
            --output json > /tmp/gifforge-deployment-outputs.json

          fqdn="$(jq -r '.containerAppFqdn.value' /tmp/gifforge-deployment-outputs.json)"
          if [ -z "$fqdn" ] || [ "$fqdn" = "null" ]; then
            echo "Deployment did not return containerAppFqdn." >&2
            cat /tmp/gifforge-deployment-outputs.json >&2
            exit 1
          fi

          echo "backend_url=https://${fqdn}" >> "$GITHUB_OUTPUT"
          echo "Deployed GifForge API to https://${fqdn}"
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          GIFFORGE_APP_ATTEST_APP_IDENTIFIER: ${{ secrets.GIFFORGE_APP_ATTEST_APP_IDENTIFIER }}
          GIFFORGE_APP_ATTEST_ROOT_CERTIFICATE_PEM: ${{ secrets.GIFFORGE_APP_ATTEST_ROOT_CERTIFICATE_PEM }}
          GIFFORGE_APP_STORE_JWS_ROOT_CERTIFICATE_PEM: ${{ secrets.GIFFORGE_APP_STORE_JWS_ROOT_CERTIFICATE_PEM }}

      - name: Smoke test backend
        run: scripts/smoke-backend.sh
        env:
          GIFFORGE_BACKEND_URL: ${{ steps.deploy.outputs.backend_url }}
          GIFFORGE_SMOKE_TIMEOUT_SECONDS: 180
          GIFFORGE_SMOKE_EXPECT_APP_ATTEST_REQUIRED: "true"
