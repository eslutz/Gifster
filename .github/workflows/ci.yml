name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  BACKEND_IMAGE: ghcr.io/eslutz/gifster-backend

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: Build backend
        run: dotnet build Backend/Gifster.Backend.csproj --configuration Release

      - name: Build backend tests
        run: dotnet build Backend.Tests/Gifster.Backend.Tests.csproj --configuration Release

      - name: Run backend tests
        run: dotnet run --project Backend.Tests/Gifster.Backend.Tests.csproj --configuration Release

      - name: Publish backend Native AOT
        run: dotnet publish Backend/Gifster.Backend.csproj --configuration Release --runtime linux-x64 --self-contained true --output /tmp/gifster-backend-publish

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish backend container image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  infrastructure:
    name: Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Build Bicep template
        run: |
          az bicep build --file infra/main.bicep
          az bicep build --file infra/main.subscription.bicep

  ios:
    name: iOS Project
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Regenerate Xcode project
        run: xcodegen generate

      - name: Check generated project is committed
        run: git diff --exit-code Gifster.xcodeproj App/Gifster/Info.plist Extensions/GifsterMessages/Info.plist

      - name: Run Swift package tests
        working-directory: Packages/GifsterCore
        run: swift test --scratch-path /tmp/gifster-swiftpm

      - name: Lint plists and entitlements
        run: |
          plutil -lint \
            App/Gifster/Info.plist \
            App/Gifster/Gifster.entitlements \
            Extensions/GifsterMessages/Info.plist \
            Extensions/GifsterMessages/GifsterMessages.entitlements
