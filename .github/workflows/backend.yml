name: Backend

on:
  workflow_dispatch:
    inputs:
      publish_image:
        description: Publish the backend image to GHCR for the selected ref.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  pull_request:
    paths:
      - Backend/**
      - Backend.Tests/**
      - CostUpdater/**
      - CostUpdater.Tests/**
      - scripts/validate-provider-onboarding.rb
      - .dockerignore
      - .github/workflows/backend.yml
  push:
    branches:
      - main
    paths:
      - Backend/**
      - Backend.Tests/**
      - CostUpdater/**
      - CostUpdater.Tests/**
      - scripts/validate-provider-onboarding.rb
      - .dockerignore
      - .github/workflows/backend.yml

permissions:
  contents: read

env:
  BACKEND_IMAGE: ghcr.io/eslutz/gifforge-backend

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install Native AOT prerequisites
        run: sudo apt-get update && sudo apt-get install -y clang libicu-dev libssl-dev zlib1g-dev

      - name: Build backend
        run: dotnet build Backend/GifForge.Backend.csproj --configuration Release

      - name: Build backend tests
        run: dotnet build Backend.Tests/GifForge.Backend.Tests.csproj --configuration Release

      - name: Build cost updater
        run: dotnet build CostUpdater/GifForge.CostUpdater.csproj --configuration Release

      - name: Build cost updater tests
        run: dotnet build CostUpdater.Tests/GifForge.CostUpdater.Tests.csproj --configuration Release

      - name: Run backend tests
        run: dotnet test Backend.Tests/GifForge.Backend.Tests.csproj --configuration Release --no-build

      - name: Run cost updater tests
        run: dotnet test CostUpdater.Tests/GifForge.CostUpdater.Tests.csproj --configuration Release --no-build

      - name: Validate provider onboarding tooling
        run: |
          ruby -c scripts/validate-provider-onboarding.rb
          scripts/validate-provider-onboarding.rb --template /tmp/gifforge-provider-onboarding-template.json

      - name: Publish backend Native AOT
        run: dotnet publish Backend/GifForge.Backend.csproj --configuration Release --runtime linux-x64 --self-contained true --output /tmp/gifforge-backend-publish

      - name: Login to GHCR
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_image == 'true')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish backend container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Backend/Dockerfile
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_image == 'true') }}
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Tag latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker buildx imagetools create -t "${BACKEND_IMAGE}:latest" "${BACKEND_IMAGE}:${GITHUB_SHA}"
