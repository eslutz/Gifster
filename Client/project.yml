name: GifForge
options:
  bundleIdPrefix: dev.ericslutz
  deploymentTarget:
    iOS: "26.5"
  xcodeVersion: "2650"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.5"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: QS3GC3CT43
    GENERATE_INFOPLIST_FILE: NO
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
  configs:
    Debug:
      APP_ATTEST_ENVIRONMENT: development
    Release:
      APP_ATTEST_ENVIRONMENT: production
packages:
  GifForgeCore:
    path: Packages/GifForgeCore
targets:
  GifForge:
    type: application
    platform: iOS
    sources:
      - App/GifForge
    resources:
      - App/GifForge/Assets.xcassets
      - App/GifForge/PrivacyInfo.xcprivacy
    dependencies:
      - package: GifForgeCore
      - target: GifForgeMessagesExtension
      - sdk: AuthenticationServices.framework
      - sdk: StoreKit.framework
    info:
      path: App/GifForge/Info.plist
      properties:
        CFBundleDisplayName: GifForge
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: App/GifForge/GifForge.entitlements
      properties:
        com.apple.developer.devicecheck.appattest-environment: $(APP_ATTEST_ENVIRONMENT)
        keychain-access-groups:
          - $(AppIdentifierPrefix)dev.ericslutz.gifforge.auth
        com.apple.security.application-groups:
          - group.dev.ericslutz.gifforge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.ericslutz.gifforge
        PRODUCT_NAME: GifForge
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
  GifForgeMessagesExtension:
    type: app-extension.messages
    platform: iOS
    sources:
      - Extensions/GifForgeMessages
    resources:
      - Extensions/GifForgeMessages/Assets.xcassets
      - Extensions/GifForgeMessages/PrivacyInfo.xcprivacy
    dependencies:
      - package: GifForgeCore
      - sdk: Messages.framework
      - sdk: PhotosUI.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
    info:
      path: Extensions/GifForgeMessages/Info.plist
      properties:
        CFBundleDisplayName: GifForge
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.message-payload-provider
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).MessagesViewController
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: Extensions/GifForgeMessages/GifForgeMessages.entitlements
      properties:
        com.apple.developer.devicecheck.appattest-environment: $(APP_ATTEST_ENVIRONMENT)
        keychain-access-groups:
          - $(AppIdentifierPrefix)dev.ericslutz.gifforge.auth
        com.apple.security.application-groups:
          - group.dev.ericslutz.gifforge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.ericslutz.gifforge.messagesextension
        PRODUCT_NAME: GifForgeMessagesExtension
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
  GifForgeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/GifForgeUITests
    dependencies:
      - target: GifForge
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: dev.ericslutz.gifforge.UITests
        PRODUCT_NAME: GifForgeUITests
        TEST_TARGET_NAME: GifForge
schemes:
  GifForge:
    build:
      targets:
        GifForge: all
        GifForgeMessagesExtension: all
        GifForgeUITests: test
    test:
      targets:
        - GifForgeUITests
    run:
      config: Debug
