name: Gifster
options:
  bundleIdPrefix: dev.ericslutz
  deploymentTarget:
    iOS: "26.5"
  xcodeVersion: "2650"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.5"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
packages:
  GifsterCore:
    path: Packages/GifsterCore
targets:
  Gifster:
    type: application
    platform: iOS
    sources:
      - App/Gifster
    resources:
      - App/Gifster/Assets.xcassets
    dependencies:
      - package: GifsterCore
      - target: GifsterMessagesExtension
    info:
      path: App/Gifster/Info.plist
      properties:
        CFBundleDisplayName: Gifster
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: App/Gifster/Gifster.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.ericslutz.Gifster
        PRODUCT_NAME: Gifster
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
  GifsterMessagesExtension:
    type: app-extension.messages
    platform: iOS
    sources:
      - Extensions/GifsterMessages
    resources:
      - Extensions/GifsterMessages/Assets.xcassets
    dependencies:
      - package: GifsterCore
      - sdk: Messages.framework
      - sdk: PhotosUI.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
    info:
      path: Extensions/GifsterMessages/Info.plist
      properties:
        CFBundleDisplayName: Gifster
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.message-payload-provider
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).MessagesViewController
    entitlements:
      path: Extensions/GifsterMessages/GifsterMessages.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.ericslutz.Gifster.MessagesExtension
        PRODUCT_NAME: GifsterMessagesExtension
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
schemes:
  Gifster:
    build:
      targets:
        Gifster: all
        GifsterMessagesExtension: all
    run:
      config: Debug
