name: Gifster
options:
  bundleIdPrefix: dev.ericslutz
  deploymentTarget:
    iOS: "26.5"
  xcodeVersion: "2650"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.5"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
  configs:
    Debug:
      APP_ATTEST_ENVIRONMENT: development
    Release:
      APP_ATTEST_ENVIRONMENT: production
packages:
  GifsterCore:
    path: Packages/GifsterCore
targets:
  Gifster:
    type: application
    platform: iOS
    sources:
      - App/Gifster
    resources:
      - App/Gifster/Assets.xcassets
      - App/Gifster/PrivacyInfo.xcprivacy
    dependencies:
      - package: GifsterCore
      - target: GifsterMessagesExtension
    info:
      path: App/Gifster/Info.plist
      properties:
        CFBundleDisplayName: Gifster
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: App/Gifster/Gifster.entitlements
      properties:
        com.apple.developer.devicecheck.appattest-environment: $(APP_ATTEST_ENVIRONMENT)
        com.apple.security.application-groups:
          - group.dev.ericslutz.Gifster
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.ericslutz.Gifster
        PRODUCT_NAME: Gifster
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
  GifsterMessagesExtension:
    type: app-extension.messages
    platform: iOS
    sources:
      - Extensions/GifsterMessages
    resources:
      - Extensions/GifsterMessages/Assets.xcassets
      - Extensions/GifsterMessages/PrivacyInfo.xcprivacy
    dependencies:
      - package: GifsterCore
      - sdk: Messages.framework
      - sdk: PhotosUI.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
    info:
      path: Extensions/GifsterMessages/Info.plist
      properties:
        CFBundleDisplayName: Gifster
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.message-payload-provider
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).MessagesViewController
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: Extensions/GifsterMessages/GifsterMessages.entitlements
      properties:
        com.apple.developer.devicecheck.appattest-environment: $(APP_ATTEST_ENVIRONMENT)
        com.apple.security.application-groups:
          - group.dev.ericslutz.Gifster
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.ericslutz.Gifster.MessagesExtension
        PRODUCT_NAME: GifsterMessagesExtension
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
  GifsterUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/GifsterUITests
    dependencies:
      - target: Gifster
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: dev.ericslutz.Gifster.UITests
        PRODUCT_NAME: GifsterUITests
        TEST_TARGET_NAME: Gifster
schemes:
  Gifster:
    build:
      targets:
        Gifster: all
        GifsterMessagesExtension: all
        GifsterUITests: test
    test:
      targets:
        - GifsterUITests
    run:
      config: Debug
